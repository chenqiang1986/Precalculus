  </text>
  <text x="540" y="292" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="22" fill="#374151">
    (-1, 2)
  </text>
  <text x="780" y="292" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="22" fill="#374151">
