<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340">
  <rect width="1200" height="340" fill="#ffffff"/>

  <text x="600" y="48" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">
    <tspan>Sign Chart for -(x+1)</tspan><tspan baseline-shift="super" font-size="18">2</tspan><tspan>(x-2)(x-4)</tspan>
  </text>

  <line x1="110" y1="190" x2="1090" y2="190" stroke="#111827" stroke-width="4"/>
  <polygon points="1090,190 1068,180 1068,200" fill="#111827"/>
  <polygon points="110,190 132,180 132,200" fill="#111827"/>

  <line x1="390" y1="165" x2="390" y2="215" stroke="#2563eb" stroke-width="4"/>
  <line x1="690" y1="165" x2="690" y2="215" stroke="#2563eb" stroke-width="4"/>
  <line x1="870" y1="165" x2="870" y2="215" stroke="#2563eb" stroke-width="4"/>

  <circle cx="390" cy="190" r="7" fill="#2563eb"/>
  <circle cx="690" cy="190" r="7" fill="#2563eb"/>
  <circle cx="870" cy="190" r="7" fill="#2563eb"/>

  <text x="390" y="108" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#1d4ed8">
    -1
  </text>
  <text x="690" y="108" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#1d4ed8">
    2
  </text>
  <text x="870" y="108" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#1d4ed8">
    4
  </text>

  <text x="390" y="138" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="22" fill="#b45309">
    multiplicity 2
  </text>
  <text x="690" y="138" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="22" fill="#b45309">
    multiplicity 1
  </text>
  <text x="870" y="138" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="22" fill="#b45309">
    multiplicity 1
  </text>

  <text x="235" y="250" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#b91c1c">
    -
  </text>
  <text x="540" y="250" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#b91c1c">
    -
  </text>
  <text x="780" y="250" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#15803d">
    +
  </text>
  <text x="980" y="250" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#b91c1c">
    -
  </text>

  <text x="235" y="292" text-anchor="middle" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="22" fill="#374151">
