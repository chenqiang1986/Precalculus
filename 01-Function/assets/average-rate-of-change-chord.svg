<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Average rate of change as slope of a chord</title>
  <desc id="desc">A smooth upward curving graph with two marked points labeled a and b connected by a straight chord line, illustrating average rate of change.</desc>
  <rect width="960" height="540" fill="#ffffff"/>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="160" y1="90" x2="160" y2="450"/>
    <line x1="280" y1="90" x2="280" y2="450"/>
    <line x1="400" y1="90" x2="400" y2="450"/>
    <line x1="520" y1="90" x2="520" y2="450"/>
    <line x1="640" y1="90" x2="640" y2="450"/>
    <line x1="760" y1="90" x2="760" y2="450"/>
    <line x1="120" y1="90" x2="840" y2="90"/>
    <line x1="120" y1="150" x2="840" y2="150"/>
    <line x1="120" y1="210" x2="840" y2="210"/>
    <line x1="120" y1="270" x2="840" y2="270"/>
    <line x1="120" y1="330" x2="840" y2="330"/>
    <line x1="120" y1="390" x2="840" y2="390"/>
    <line x1="120" y1="450" x2="840" y2="450"/>
  </g>
  <g stroke="#111827" stroke-width="2.5" fill="none">
    <line x1="120" y1="420" x2="850" y2="420"/>
    <line x1="160" y1="460" x2="160" y2="80"/>
  </g>
  <g fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="20">
    <text x="858" y="427">x</text>
    <text x="168" y="76">y</text>
  </g>
  <path
    d="M 175 385 C 250 375, 305 355, 360 325 C 430 285, 500 235, 575 180 C 640 132, 705 102, 805 95"
    fill="none"
    stroke="#2563eb"
    stroke-width="6"
    stroke-linecap="round"/>
  <line x1="280" y1="352" x2="700" y2="120" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
  <g fill="#dc2626">
    <circle cx="280" cy="352" r="7"/>
    <circle cx="700" cy="120" r="7"/>
  </g>
  <g stroke="#6b7280" stroke-width="2" stroke-dasharray="7 6">
    <line x1="280" y1="352" x2="280" y2="420"/>
    <line x1="700" y1="120" x2="700" y2="420"/>
    <line x1="160" y1="352" x2="280" y2="352"/>
    <line x1="160" y1="120" x2="700" y2="120"/>
  </g>
  <g fill="#111827" font-family="Helvetica, Arial, sans-serif" font-size="22">
    <text x="270" y="447">a</text>
    <text x="692" y="447">b</text>
    <text x="214" y="345">f(a)</text>
    <text x="642" y="114">f(b)</text>
  </g>
  <g fill="#dc2626" font-family="Helvetica, Arial, sans-serif" font-size="22">
    <text x="452" y="210">chord</text>
  </g>
</svg>
