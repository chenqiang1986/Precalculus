<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .label {
        font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-size: 24px;
        fill: #0f172a;
      }
      .small {
        font-size: 20px;
      }
      .math {
        font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-size: 26px;
        fill: #0f172a;
      }
      .caption {
        font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-size: 18px;
        fill: #334155;
      }
    </style>
  </defs>

  <rect width="1000" height="620" fill="#ffffff"/>

  <text x="70" y="70" class="math">(a + b) · c = a · c + b · c</text>
  <text x="70" y="105" class="caption">Head-to-tail geometry shows that projection onto c adds.</text>

  <line x1="120" y1="420" x2="860" y2="420" stroke="#334155" stroke-width="6" marker-end="url(#arrow-slate)"/>
  <text x="872" y="428" class="label">c</text>

  <line x1="120" y1="420" x2="360" y2="240" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow-blue)"/>
  <text x="228" y="285" class="label">a</text>

  <line x1="360" y1="240" x2="660" y2="170" stroke="#ea580c" stroke-width="6" marker-end="url(#arrow-orange)"/>
  <text x="500" y="212" class="label">b</text>

  <line x1="120" y1="420" x2="660" y2="170" stroke="#059669" stroke-width="7" marker-end="url(#arrow-green)"/>
  <text x="410" y="282" class="label">a + b</text>

  <line x1="360" y1="240" x2="360" y2="420" stroke="#94a3b8" stroke-width="3" stroke-dasharray="10 10"/>
  <line x1="660" y1="170" x2="660" y2="420" stroke="#94a3b8" stroke-width="3" stroke-dasharray="10 10"/>

  <circle cx="120" cy="420" r="5" fill="#0f172a"/>
  <circle cx="360" cy="420" r="5" fill="#0f172a"/>
  <circle cx="660" cy="420" r="5" fill="#0f172a"/>
  <text x="106" y="450" class="small label">O</text>
  <text x="347" y="450" class="small label">P</text>
  <text x="647" y="450" class="small label">Q</text>

  <line x1="120" y1="470" x2="360" y2="470" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
  <line x1="120" y1="460" x2="120" y2="480" stroke="#2563eb" stroke-width="4"/>
  <line x1="360" y1="460" x2="360" y2="480" stroke="#2563eb" stroke-width="4"/>
  <text x="173" y="505" class="small label" fill="#2563eb">proj_c(a)</text>

  <line x1="360" y1="470" x2="660" y2="470" stroke="#ea580c" stroke-width="8" stroke-linecap="round"/>
  <line x1="660" y1="460" x2="660" y2="480" stroke="#ea580c" stroke-width="4"/>
  <text x="426" y="505" class="small label" fill="#ea580c">proj_c(b)</text>

  <line x1="120" y1="545" x2="660" y2="545" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <line x1="120" y1="535" x2="120" y2="555" stroke="#059669" stroke-width="4"/>
  <line x1="660" y1="535" x2="660" y2="555" stroke="#059669" stroke-width="4"/>
  <text x="282" y="580" class="small label" fill="#059669">proj_c(a + b)</text>

  <text x="720" y="258" class="caption">Since OP + PQ = OQ,</text>
  <text x="720" y="290" class="caption">proj_c(a) + proj_c(b) = proj_c(a + b).</text>
  <text x="720" y="342" class="caption">Multiply both sides by |c|:</text>
  <text x="720" y="380" class="math">(a + b) · c = a · c + b · c</text>
</svg>
